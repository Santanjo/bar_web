<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { background:#1e1e2f; color:white; font-family:Arial; text-align:center; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,120px); gap:10px; justify-content:center; }
.produto { background:#2ecc71; padding:20px; border:none; border-radius:10px; font-size:16px; }
button { margin:5px; padding:10px; border:none; border-radius:8px; }
input, select { padding:10px; margin:5px; border-radius:8px; }
</style>
</head>

<body>

<h2>🍺 Caixa do Bar</h2>

<div class="grid">
{% for p in produtos %}
<button class="produto" onclick="sel('{{p[0]}}')">{{p[0]}}</button>
{% endfor %}
</div>

<br>

<input id="produto" placeholder="Produto" readonly>
<input id="qtd" type="number" value="1">

<br>

<select id="garcom">
{% for g in garcons %}
<option>{{g[0]}}</option>
{% endfor %}
</select>

<select id="local">
<option>BAR1</option>
<option>BAR2</option>
</select>

<br>

<button style="background:green;color:white;" onclick="vender()">VENDER</button>

<h3>Cancelar Venda</h3>
<form action="/cancelar" method="post">
<input name="id" placeholder="ID da venda">
<button style="background:red;color:white;">Cancelar</button>
</form>

<script>
function sel(p){
    document.getElementById("produto").value = p
}

function vender(){
    let f = document.createElement("form")
    f.method = "POST"
    f.action = "/vender"

    f.innerHTML = `
    <input name="produto" value="${produto.value}">
    <input name="garcom" value="${garcom.value}">
    <input name="local" value="${local.value}">
    <input name="qtd" value="${qtd.value}">
    `

    document.body.appendChild(f)
    f.submit()
}
</script>

</body>
</html>
